<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Messenger</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0a0a0a;min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      padding:20px 0;
    }
    .bg{
      position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse at 70% 30%, rgba(131,58,180,.14) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 70%, rgba(0,149,246,.12) 0%, transparent 60%);
    }
    .card{
      position:relative;z-index:1;
      background:#161616;border:1px solid rgba(255,255,255,.08);
      border-radius:22px;padding:44px 40px;
      width:100%;max-width:420px;margin:20px;
      box-shadow:0 32px 80px rgba(0,0,0,.55);
    }
    .logo{
      width:62px;height:62px;border-radius:18px;
      background:linear-gradient(135deg,#833ab4,#0095f6);
      display:flex;align-items:center;justify-content:center;
      font-size:1.8rem;margin:0 auto 18px;
    }
    h2{color:#fff;font-size:1.65rem;font-weight:800;text-align:center;margin-bottom:6px}
    .sub{color:rgba(255,255,255,.4);font-size:.88rem;text-align:center;margin-bottom:30px}
    .fg{margin-bottom:15px}
    label{display:block;color:rgba(255,255,255,.65);font-size:.8rem;font-weight:700;margin-bottom:7px;letter-spacing:.03em;text-transform:uppercase}
    .iw{position:relative}
    .iw i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);font-size:.88rem;pointer-events:none}
    input{
      width:100%;background:rgba(255,255,255,.06);
      border:1.5px solid rgba(255,255,255,.1);border-radius:12px;
      padding:13px 14px 13px 40px;color:#fff;font-size:.95rem;font-family:inherit;
      transition:border-color .2s,background .2s;outline:none;
    }
    input:focus{border-color:#833ab4;background:rgba(131,58,180,.08)}
    input::placeholder{color:rgba(255,255,255,.22)}
    .strength{display:flex;gap:4px;margin-top:6px}
    .sbar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;transition:background .3s}
    .w{background:#ff4757}.m{background:#ffa502}.s{background:#2ed573}
    .btn{
      width:100%;padding:14px;margin-top:6px;
      background:linear-gradient(135deg,#833ab4,#0095f6);
      color:#fff;border:none;border-radius:12px;
      font-size:1rem;font-weight:700;cursor:pointer;
      transition:all .25s;box-shadow:0 6px 20px rgba(131,58,180,.35);
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(131,58,180,.5)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .alert{padding:11px 14px;border-radius:10px;font-size:.86rem;margin-bottom:18px;display:flex;align-items:center;gap:8px}
    .err{background:rgba(255,70,70,.12);border:1px solid rgba(255,70,70,.25);color:#ff8080}
    .ok{background:rgba(0,200,100,.12);border:1px solid rgba(0,200,100,.25);color:#4ade80}
    .foot{text-align:center;margin-top:22px;color:rgba(255,255,255,.4);font-size:.88rem}
    .foot a{color:#0095f6;text-decoration:none;font-weight:700}
    .foot a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="card">
  <div class="logo">✨</div>
  <h2>Create account</h2>
  <p class="sub">Join Messenger — it's free</p>
  <div id="alertBox"></div>
  <form id="form">
    <div class="fg">
      <label>Username</label>
      <div class="iw">
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Pick a username" required minlength="3" autocomplete="username"/>
      </div>
    </div>
    <div class="fg">
      <label>Email</label>
      <div class="iw">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
    </div>
    <div class="fg">
      <label>Password</label>
      <div class="iw">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password"/>
      </div>
      <div class="strength">
        <div class="sbar" id="b1"></div>
        <div class="sbar" id="b2"></div>
        <div class="sbar" id="b3"></div>
      </div>
    </div>
    <div class="fg">
      <label>Confirm Password</label>
      <div class="iw">
        <i class="fas fa-lock"></i>
        <input type="password" id="confirm" placeholder="Repeat password" required autocomplete="new-password"/>
      </div>
    </div>
    <button type="submit" class="btn" id="btn">
      <i class="fas fa-user-plus"></i> Create Account
    </button>
  </form>
  <div class="foot"><p>Already have an account? <a href="/login">Sign in</a></p></div>
</div>
<script>
  if (localStorage.getItem('token')) window.location.href = '/chat';

  document.getElementById('password').addEventListener('input', function () {
    const v = this.value;
    const bars = ['b1','b2','b3'].map(id => document.getElementById(id));
    bars.forEach(b => b.className = 'sbar');
    if (v.length >= 6)  bars[0].classList.add(v.length >= 10 ? 's' : 'm');
    if (v.length >= 8  && /[A-Z]/.test(v)) bars[1].classList.add(v.length >= 12 ? 's' : 'm');
    if (v.length >= 10 && /[A-Z]/.test(v) && /[0-9]/.test(v)) bars[2].classList.add('s');
  });

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const box = document.getElementById('alertBox');
    box.innerHTML = '';

    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;

    if (password !== confirm) {
      box.innerHTML = '<div class="alert err"><i class="fas fa-exclamation-circle"></i> Passwords do not match.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';

    try {
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        box.innerHTML = '<div class="alert ok"><i class="fas fa-check-circle"></i> Account created! Loading Messenger…</div>';
        setTimeout(() => window.location.href = '/chat', 700);
      } else {
        box.innerHTML = `<div class="alert err"><i class="fas fa-exclamation-circle"></i> ${data.error}</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
      }
    } catch {
      box.innerHTML = '<div class="alert err"><i class="fas fa-wifi"></i> Connection error — try again.</div>';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }
  });
</script>
</body>
</html>
