<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Messenger</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════
   THEMES
═══════════════════════════════════════════════════════ */
:root{
  --bg:#18191a;--sidebar:#242526;--card:#3a3b3c;
  --blue:#0095f6;--blue2:#0070d0;
  --text:#e4e6eb;--text2:#b0b3b8;
  --hover:rgba(255,255,255,.07);--border:rgba(255,255,255,.08);
  --green:#31a24c;--red:#f02849;
  --msg-in:#3a3b3c;--msg-out:#0095f6;
  --msg-in-text:#e4e6eb;--msg-out-text:#fff;
  --input-bg:#3a3b3c;
}
[data-theme="light"]{
  --bg:#f0f2f5;--sidebar:#fff;--card:#e4e6eb;
  --blue:#0095f6;--blue2:#0070d0;
  --text:#050505;--text2:#65676b;
  --hover:rgba(0,0,0,.05);--border:rgba(0,0,0,.1);
  --green:#31a24c;--red:#f02849;
  --msg-in:#e4e6eb;--msg-out:#0095f6;
  --msg-in-text:#050505;--msg-out-text:#fff;
  --input-bg:#f0f2f5;
}
[data-theme="purple"]{
  --bg:#0d0d1a;--sidebar:#151528;--card:#1e1e38;
  --blue:#a855f7;--blue2:#9333ea;
  --text:#e2e8f0;--text2:#94a3b8;
  --hover:rgba(168,85,247,.1);--border:rgba(168,85,247,.15);
  --green:#22c55e;--red:#f43f5e;
  --msg-in:#1e1e38;--msg-out:#a855f7;
  --msg-in-text:#e2e8f0;--msg-out-text:#fff;
  --input-bg:#1e1e38;
}
[data-theme="green"]{
  --bg:#0a1a0f;--sidebar:#0f2318;--card:#163024;
  --blue:#22c55e;--blue2:#16a34a;
  --text:#dcfce7;--text2:#86efac;
  --hover:rgba(34,197,94,.1);--border:rgba(34,197,94,.15);
  --green:#22c55e;--red:#f43f5e;
  --msg-in:#163024;--msg-out:#22c55e;
  --msg-in-text:#dcfce7;--msg-out-text:#fff;
  --input-bg:#163024;
}
[data-theme="sunset"]{
  --bg:#1a0a00;--sidebar:#2a1200;--card:#3d1f08;
  --blue:#f97316;--blue2:#ea580c;
  --text:#fff7ed;--text2:#fed7aa;
  --hover:rgba(249,115,22,.1);--border:rgba(249,115,22,.15);
  --green:#22c55e;--red:#f43f5e;
  --msg-in:#3d1f08;--msg-out:#f97316;
  --msg-in-text:#fff7ed;--msg-out-text:#fff;
  --input-bg:#3d1f08;
}

/* ═══════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  display:flex;transition:background .3s,color .3s;
}
*::-webkit-scrollbar{width:4px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:4px}

/* ═══════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════ */
#sidebar{
  width:340px;min-width:0;
  background:var(--sidebar);
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  transition:background .3s,transform .3s;
  z-index:20;flex-shrink:0;
}
.sb-top{
  padding:14px 14px 8px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.sb-top h1{
  font-size:1.3rem;font-weight:800;
  background:linear-gradient(135deg,var(--blue),#833ab4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sb-top-actions{display:flex;gap:6px}
.icon-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--card);border:none;color:var(--text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:background .2s;position:relative;flex-shrink:0;
}
.icon-btn:hover{background:var(--hover);filter:brightness(1.2)}
.badge{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);color:#fff;border-radius:50%;
  width:15px;height:15px;font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--sidebar);
}

/* Tabs */
.tabs{display:flex;padding:8px 8px 4px;gap:3px}
.tab{
  flex:1;padding:7px 4px;border-radius:10px;border:none;
  background:transparent;color:var(--text2);
  cursor:pointer;font-size:.82rem;font-weight:600;
  transition:background .2s,color .2s;
}
.tab.active{background:rgba(0,149,246,.15);color:var(--blue)}
[data-theme="purple"] .tab.active{background:rgba(168,85,247,.15);color:var(--blue)}
[data-theme="green"]  .tab.active{background:rgba(34,197,94,.15);color:var(--blue)}
[data-theme="sunset"] .tab.active{background:rgba(249,115,22,.15);color:var(--blue)}
.tab:hover:not(.active){background:var(--hover)}

/* Search */
.sb-search{padding:6px 10px 4px}
.search-wrap{position:relative}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:.82rem}
.search-wrap input{
  width:100%;background:var(--card);border:none;border-radius:20px;
  padding:8px 11px 8px 32px;color:var(--text);font-size:.88rem;outline:none;
}
.search-wrap input::placeholder{color:var(--text2)}

/* Lists */
#friend-list,#people-list,#request-list{flex:1;overflow-y:auto;padding:4px 6px 8px}
.section-label{
  padding:6px 8px 3px;font-size:.74rem;font-weight:700;
  color:var(--text2);text-transform:uppercase;letter-spacing:.05em;
}
.empty-state{text-align:center;padding:28px 12px;color:var(--text2)}
.empty-state i{font-size:2rem;margin-bottom:10px;opacity:.35;display:block}
.empty-state p{font-size:.86rem;line-height:1.5}

/* Friend items */
.friend-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 8px;border-radius:12px;cursor:pointer;
  transition:background .15s;
}
.friend-item:hover,.friend-item.active{background:var(--hover)}
.friend-item.active{background:rgba(0,149,246,.1)}
.av{position:relative;flex-shrink:0}
.av img,.av .av-letter{
  width:44px;height:44px;border-radius:50%;object-fit:cover;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1rem;color:#fff;
  background:linear-gradient(135deg,var(--blue),#833ab4);
}
.av-dot{
  position:absolute;bottom:1px;right:1px;
  width:11px;height:11px;
  background:var(--green);border-radius:50%;
  border:2px solid var(--sidebar);
}
.av-dot.off{background:#5c5c5c}
.fi-info{flex:1;min-width:0}
.fi-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-last{font-size:.77rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.fi-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.unread{
  background:var(--blue);color:#fff;border-radius:50%;
  width:17px;height:17px;font-size:.68rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}

/* People items */
.people-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;margin-bottom:3px}
.pi-info{flex:1;min-width:0}
.pi-name{font-weight:600;font-size:.9rem}
.pi-actions{display:flex;gap:5px;flex-shrink:0}
.pi-btn{
  padding:5px 11px;border-radius:8px;border:none;
  font-size:.79rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.pi-btn.add{background:rgba(0,149,246,.2);color:var(--blue)}
.pi-btn.add:hover{background:rgba(0,149,246,.35)}
.pi-btn.pending{background:var(--hover);color:var(--text2);cursor:default}
.pi-btn.friends{background:rgba(34,197,94,.12);color:#4ade80;cursor:default}
.pi-btn.accept{background:rgba(0,149,246,.2);color:var(--blue)}
.pi-btn.accept:hover{background:rgba(0,149,246,.35)}
.pi-btn.decline{background:var(--hover);color:var(--text2)}
.pi-btn.decline:hover{background:rgba(240,40,73,.12);color:var(--red)}
.pi-btn.msg{background:rgba(0,149,246,.15);color:var(--blue);padding:5px 9px}

/* ═══════════════════════════════════════════════════════
   MAIN CHAT AREA
═══════════════════════════════════════════════════════ */
#main{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);min-width:0;transition:background .3s;
}

/* Empty state */
#empty-chat{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:var(--text2);
  padding:20px;text-align:center;
}
#empty-chat .em-icon{
  width:72px;height:72px;background:rgba(0,149,246,.1);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;margin-bottom:14px;
}
#empty-chat h3{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:6px}
#empty-chat p{font-size:.86rem}

/* Chat header */
#chat-header{
  display:none;padding:10px 16px;
  background:var(--sidebar);border-bottom:1px solid var(--border);
  align-items:center;gap:12px;flex-shrink:0;
  transition:background .3s;
}
.hdr-av{position:relative;flex-shrink:0}
.hdr-av img,.hdr-av .av-letter{
  width:38px;height:38px;border-radius:50%;object-fit:cover;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.88rem;color:#fff;
  background:linear-gradient(135deg,var(--blue),#833ab4);
}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-status{font-size:.76rem;color:var(--text2)}
.hdr-status.online{color:var(--green)}
.hdr-actions{display:flex;gap:5px;flex-shrink:0}

/* Back button (mobile) */
#back-btn{display:none}

/* Messages */
#messages{
  flex:1;overflow-y:auto;
  padding:14px 14px 6px;
  display:flex;flex-direction:column;gap:1px;
}
.msg-row{
  display:flex;align-items:flex-end;gap:6px;
  width:100%;margin-bottom:1px;
}
.msg-row.them{flex-direction:row;justify-content:flex-start}
.msg-row.mine{flex-direction:row-reverse;justify-content:flex-start}
.msg-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;overflow:hidden;align-self:flex-end}
.msg-av img,.msg-av .av-letter{
  width:26px;height:26px;border-radius:50%;object-fit:cover;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--blue),#833ab4);
}
.msg-av.hide{visibility:hidden}
.bubble-wrap{
  position:relative;display:flex;flex-direction:column;
  max-width:65%;
}
.bubble{
  padding:8px 13px;border-radius:18px;
  font-size:.91rem;line-height:1.5;word-break:break-word;width:fit-content;
}
.msg-row.them .bubble{
  background:var(--msg-in);color:var(--msg-in-text);
  border-bottom-left-radius:4px;align-self:flex-start;
}
.msg-row.mine .bubble{
  background:var(--msg-out);color:var(--msg-out-text);
  border-bottom-right-radius:4px;align-self:flex-end;
}
.bubble img{max-width:180px;max-height:180px;border-radius:10px;display:block;cursor:pointer}
.msg-meta{
  font-size:.64rem;color:var(--text2);margin-top:2px;
  display:flex;align-items:center;gap:3px;padding:0 3px;
}
.msg-row.them .msg-meta{justify-content:flex-start}
.msg-row.mine .msg-meta{justify-content:flex-end}
.seen-icon{font-size:.65rem}
.seen-icon.seen{color:#90caf9}
.msg-actions{
  position:absolute;top:-11px;display:none;gap:3px;z-index:5;
}
.msg-row.them .msg-actions{left:3px}
.msg-row.mine .msg-actions{right:3px}
.bubble-wrap:hover .msg-actions{display:flex}
.msg-act-btn{
  width:24px;height:24px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.68rem;color:var(--text2);transition:all .15s;
}
.msg-act-btn:hover{background:var(--hover);color:var(--text)}

/* Typing */
#typing-indicator{
  padding:0 16px 4px;font-size:.8rem;color:var(--text2);
  min-height:18px;display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.dot-anim{display:flex;gap:3px}
.dot-anim span{
  width:5px;height:5px;background:var(--text2);border-radius:50%;
  animation:bounce .9s infinite;
}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Image preview bar */
#img-preview{
  display:none;padding:6px 14px 0;
  background:var(--sidebar);position:relative;flex-shrink:0;
}
#img-preview img{width:72px;height:72px;object-fit:cover;border-radius:10px}
#img-preview .rm-img{
  position:absolute;top:2px;left:66px;
  width:20px;height:20px;background:rgba(0,0,0,.7);
  border-radius:50%;border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.65rem;
}

/* Input area */
#chat-input-area{
  display:none;padding:10px 12px;
  background:var(--sidebar);border-top:1px solid var(--border);
  align-items:flex-end;gap:8px;flex-shrink:0;
  transition:background .3s;
}
.inp-btn{
  width:34px;height:34px;border-radius:50%;background:transparent;border:none;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;transition:color .2s;flex-shrink:0;
}
.inp-btn:hover{color:var(--blue)}
#msg-input-wrap{
  flex:1;background:var(--input-bg);border-radius:20px;
  padding:7px 12px;display:flex;align-items:flex-end;
}
#msg-input{
  flex:1;background:transparent;border:none;color:var(--text);
  font-size:.91rem;font-family:inherit;resize:none;
  max-height:110px;outline:none;line-height:1.45;
}
#msg-input::placeholder{color:var(--text2)}
#send-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--blue);border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;flex-shrink:0;transition:all .2s;
}
#send-btn:hover{background:var(--blue2);transform:scale(1.08)}
#send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#file-input{display:none}

/* ═══════════════════════════════════════════════════════
   PROFILE PANEL (right side, desktop only)
═══════════════════════════════════════════════════════ */
#profile-panel{
  display:none;width:280px;flex-shrink:0;
  background:var(--sidebar);border-left:1px solid var(--border);
  flex-direction:column;align-items:center;padding:24px 16px;gap:12px;
  transition:background .3s;overflow-y:auto;
}
#profile-panel.show{display:flex}
.pp-av{width:72px;height:72px;border-radius:50%;overflow:hidden}
.pp-av img,.pp-av .av-letter{
  width:72px;height:72px;border-radius:50%;object-fit:cover;
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--blue),#833ab4);
}
.pp-name{font-size:1rem;font-weight:700;text-align:center}
.pp-status{font-size:.8rem;color:var(--text2)}
.pp-status.online{color:var(--green)}
.pp-bio{font-size:.82rem;color:var(--text2);text-align:center;line-height:1.5}
.pp-sep{width:100%;height:1px;background:var(--border);margin:4px 0}
.pp-btn{
  width:100%;padding:9px;border-radius:10px;border:none;
  background:var(--hover);color:var(--text);cursor:pointer;
  font-size:.84rem;font-weight:600;transition:background .2s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.pp-btn:hover{background:var(--card)}
.pp-btn.danger{background:rgba(240,40,73,.1);color:var(--red)}
.pp-btn.danger:hover{background:rgba(240,40,73,.2)}

/* ═══════════════════════════════════════════════════════
   THEME PICKER DROPDOWN
═══════════════════════════════════════════════════════ */
.theme-picker{
  position:absolute;top:44px;right:0;
  background:var(--sidebar);border:1px solid var(--border);
  border-radius:14px;padding:8px;
  display:none;flex-direction:column;gap:3px;
  z-index:50;min-width:150px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.theme-picker.open{display:flex}
.tp-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:9px;cursor:pointer;
  font-size:.85rem;font-weight:600;color:var(--text);
  border:none;background:transparent;width:100%;text-align:left;
  transition:background .15s;
}
.tp-item:hover{background:var(--hover)}
.tp-item.active{background:var(--hover)}
.tp-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.theme-wrap{position:relative}

/* ═══════════════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--sidebar);border-radius:16px;padding:24px;
  width:100%;max-width:420px;border:1px solid var(--border);
  max-height:90vh;overflow-y:auto;
}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:18px}
.modal input,.modal textarea{
  width:100%;background:var(--card);border:1.5px solid var(--border);
  border-radius:10px;padding:10px 12px;color:var(--text);
  font-size:.91rem;font-family:inherit;outline:none;margin-bottom:10px;resize:none;
}
.modal input:focus,.modal textarea:focus{border-color:var(--blue)}
.modal-actions{display:flex;gap:8px;margin-top:6px}
.modal-btn{
  flex:1;padding:10px;border-radius:10px;border:none;
  cursor:pointer;font-size:.91rem;font-weight:700;transition:all .2s;
}
.modal-btn.primary{background:var(--blue);color:#fff}
.modal-btn.primary:hover{background:var(--blue2)}
.modal-btn.cancel{background:var(--hover);color:var(--text)}
.modal-btn.cancel:hover{background:var(--card)}

/* Lightbox */
#lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;
  display:none;align-items:center;justify-content:center;cursor:zoom-out;
}
#lightbox.show{display:flex}
#lightbox img{max-width:94vw;max-height:94vh;border-radius:10px}

/* Toast */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--card);color:var(--text);padding:10px 20px;
  border-radius:12px;font-size:.87rem;font-weight:600;z-index:300;
  display:none;border:1px solid var(--border);
  box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap;
  max-width:90vw;overflow:hidden;text-overflow:ellipsis;
}

/* ═══════════════════════════════════════════════════════
   MOBILE — ≤ 640px
═══════════════════════════════════════════════════════ */
@media(max-width:640px){
  #sidebar{
    position:fixed;inset:0;width:100%;
    transform:translateX(-100%);
    transition:transform .28s ease;
  }
  #sidebar.sb-open{transform:translateX(0)}

  #main{width:100%;position:relative}
  #back-btn{display:flex!important}
  #profile-panel{display:none!important}

  .bubble-wrap{max-width:80%}
  #chat-header{padding:8px 12px}
  #messages{padding:10px 10px 4px}
  #chat-input-area{padding:8px 10px}
}

/* TABLET — 641px–900px */
@media(min-width:641px) and (max-width:900px){
  #sidebar{width:260px}
  #profile-panel{display:none!important}
  .bubble-wrap{max-width:72%}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════════════ -->
<div id="sidebar">
  <div class="sb-top">
    <h1>💬 Messenger</h1>
    <div class="sb-top-actions">
      <button class="icon-btn" id="req-btn" title="Friend Requests">
        <i class="fas fa-user-plus"></i>
        <span class="badge" id="req-badge" style="display:none">0</span>
      </button>
      <!-- Theme picker -->
      <div class="theme-wrap">
        <button class="icon-btn" id="theme-btn" title="Change Theme">
          <i class="fas fa-palette"></i>
        </button>
        <div class="theme-picker" id="theme-picker">

      This will delete all messages in this conversation for you. Are you sure?
    </p>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('clear-modal')">Cancel</button>

<!-- Lightbox -->
<div id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightbox-img"/>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

/* ── Auth guard ─────────────────────────────────────── */
const token = localStorage.getItem('token');
let me = JSON.parse(localStorage.getItem('user') || 'null');
if (!token || !me) { window.location.href = '/login'; }

/* ── State ──────────────────────────────────────────── */
const socket = io();
let currentFriend   = null;
let onlineSet       = new Set();
let friendsData     = { friends:[], received:[], sent:[] };
let allUsers        = [];
let selectedImage   = null;
let typingTimer     = null;
let unreadCounts    = {};

/* ── Theme ──────────────────────────────────────────── */
(function applyTheme(){
  const saved = localStorage.getItem('msng-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved === 'dark' ? '' : saved);
  document.querySelectorAll('.tp-item').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === saved);
  });
})();

document.getElementById('theme-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('theme-picker').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('theme-picker').classList.remove('open'));

document.querySelectorAll('.tp-item').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const t = btn.dataset.theme;
    localStorage.setItem('msng-theme', t);
    document.documentElement.setAttribute('data-theme', t === 'dark' ? '' : t);
    document.querySelectorAll('.tp-item').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
    document.getElementById('theme-picker').classList.remove('open');
  });
});

/* ── Socket ─────────────────────────────────────────── */
socket.emit('join', me.id);

socket.on('online-users', ids => {
  onlineSet = new Set(ids);
  updateOnlineIndicators();
  if (currentFriend) updateChatHeader();
});

socket.on('receive-message', ({ conversationId, message }) => {
  if (currentFriend && message.senderId === currentFriend.id) {
    appendMessage(message);
    scrollToBottom();
    socket.emit('mark-seen', { conversationId, viewerId: me.id, senderId: currentFriend.id });
  } else {
    unreadCounts[message.senderId] = (unreadCounts[message.senderId] || 0) + 1;
    renderFriendList();
  }
  if (!currentFriend || message.senderId !== currentFriend.id) {
    const sender = friendsData.friends.find(f => f.id === message.senderId);
    if (sender) showToast(`${sender.username}: ${message.text || '📷 Image'}`);
  }
});

socket.on('message-sent', ({ message }) => {
  appendMessage(message);
  scrollToBottom();
});

socket.on('messages-seen', () => {
  document.querySelectorAll('.seen-icon').forEach(el => {
    el.classList.add('seen');
    el.innerHTML = '<i class="fas fa-check-double"></i>';
  });
});

socket.on('user-typing', ({ senderId, name }) => {
  if (currentFriend && senderId === currentFriend.id) {
    const ti = document.getElementById('typing-indicator');
    ti.style.display = 'flex';
    ti.innerHTML = `<div class="dot-anim"><span></span><span></span><span></span></div><span>${name} is typing…</span>`;
  }
});

socket.on('user-stop-typing', ({ senderId }) => {
  if (currentFriend && senderId === currentFriend.id) {
    const ti = document.getElementById('typing-indicator');
    ti.style.display = 'none'; ti.innerHTML = '';
  }
});

socket.on('message-deleted', ({ messageId }) => {
  const el = document.getElementById(`msg-${messageId}`);
  if (el) el.remove();
});

socket.on('friend-request', ({ user }) => {
  if (!friendsData.received.find(u => u.id === user.id)) friendsData.received.push(user);
  updateRequestBadge(); renderRequestList();
  showToast(`${user.username} sent you a friend request`);
});

socket.on('friend-request-accepted', ({ userId, user }) => {
  friendsData.sent = friendsData.sent.filter(u => u.id !== userId);
  if (!friendsData.friends.find(f => f.id === userId)) friendsData.friends.push(user);
  renderFriendList(); renderPeopleList();
  showToast(`${user.username} accepted your friend request!`);
});

/* ── API helper ─────────────────────────────────────── */
const api = async (method, url, body) => {
  const opts = { method, headers: { Authorization: `Bearer ${token}` } };
  if (body instanceof FormData) { opts.body = body; }
  else if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(url, opts);
  if (r.status === 401) { localStorage.clear(); window.location.href = '/login'; }
  return r.json();
};

/* ── Init ───────────────────────────────────────────── */
async function init() {
  const fresh = await api('GET', '/api/me');
  if (fresh.id) { me = fresh; localStorage.setItem('user', JSON.stringify(me)); }
  await Promise.all([refreshFriends(), refreshPeople()]);
}

async function refreshFriends() {
  friendsData = await api('GET', '/api/friends');
  updateRequestBadge(); renderFriendList(); renderRequestList();
}

async function refreshPeople() {
  allUsers = await api('GET', '/api/users');
  renderPeopleList();
}

/* ── Avatar element ─────────────────────────────────── */
function avatarEl(user, size = 44) {
  const wrap = document.createElement('div'); wrap.className = 'av';
  if (user.avatar) {
    const img = document.createElement('img');
    img.src = user.avatar; img.alt = user.username;
    img.style.cssText = `width:${size}px;height:${size}px`;
    wrap.appendChild(img);
  } else {
    const l = document.createElement('div'); l.className = 'av-letter';
    l.textContent = user.username[0].toUpperCase();
    l.style.cssText = `width:${size}px;height:${size}px;font-size:${size*.35}px`;
    wrap.appendChild(l);
  }
  const dot = document.createElement('div');
  dot.className = 'av-dot' + (onlineSet.has(user.id) ? '' : ' off');
  wrap.appendChild(dot);
  return wrap;
}

/* ── Render: Friends tab ────────────────────────────── */
function renderFriendList() {
  const list = document.getElementById('friend-list');
  const q = document.getElementById('search-input').value.toLowerCase();
  const arr = friendsData.friends.filter(f => !q || f.username.toLowerCase().includes(q));
  if (!arr.length) {
    list.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>No friends yet.<br>Find people in the People tab.</p></div>';
    return;
  }
  list.innerHTML = '';
  arr.forEach(f => {
    const item = document.createElement('div');
    item.className = 'friend-item' + (currentFriend?.id === f.id ? ' active' : '');
    item.id = `fi-${f.id}`;
    const av = avatarEl(f, 44);
    const info = document.createElement('div'); info.className = 'fi-info';
    const name = document.createElement('div'); name.className = 'fi-name'; name.textContent = f.username;
    const last = document.createElement('div'); last.className = 'fi-last'; last.id = `last-${f.id}`;
    last.textContent = onlineSet.has(f.id) ? 'Active now' : 'Offline';
    info.append(name, last);
    const meta = document.createElement('div'); meta.className = 'fi-meta';
    if (unreadCounts[f.id]) {
      const b = document.createElement('div'); b.className = 'unread'; b.textContent = unreadCounts[f.id];
      meta.appendChild(b);
    }
    item.append(av, info, meta);
    item.addEventListener('click', () => openChat(f));
    list.appendChild(item);
  });
}

/* ── Render: People tab ─────────────────────────────── */
function renderPeopleList() {
  const list = document.getElementById('people-list');
  const q = document.getElementById('search-input').value.toLowerCase();
  const arr = allUsers.filter(u => !q || u.username.toLowerCase().includes(q));
  if (!arr.length) {
    list.innerHTML = '<div class="empty-state"><i class="fas fa-user-friends"></i><p>No users found.</p></div>';
    return;
  }
  list.innerHTML = '';
  arr.forEach(u => {
    const isFriend   = !!friendsData.friends.find(f => f.id === u.id);
    const isSent     = !!friendsData.sent.find(f => f.id === u.id);
    const isReceived = !!friendsData.received.find(f => f.id === u.id);

    const item = document.createElement('div'); item.className = 'people-item';
    const av   = avatarEl(u, 40);
    const info = document.createElement('div'); info.className = 'pi-info';
    const nm   = document.createElement('div'); nm.className = 'pi-name'; nm.textContent = u.username;
    info.appendChild(nm);
    const acts = document.createElement('div'); acts.className = 'pi-actions';

    if (isFriend) {
      const b = document.createElement('button'); b.className = 'pi-btn friends';
      b.innerHTML = '<i class="fas fa-check"></i> Friends'; acts.appendChild(b);
      const mb = document.createElement('button'); mb.className = 'pi-btn msg';
      mb.innerHTML = '<i class="fas fa-comment"></i>';
      mb.onclick = () => { openChat(u); switchTab('chats'); };
      acts.appendChild(mb);
    } else if (isReceived) {
      const a = document.createElement('button'); a.className = 'pi-btn accept';
      a.innerHTML = '<i class="fas fa-check"></i> Accept'; a.onclick = () => acceptRequest(u.id);
      const d = document.createElement('button'); d.className = 'pi-btn decline';
      d.innerHTML = '<i class="fas fa-times"></i>'; d.onclick = () => declineRequest(u.id);
      acts.append(a, d);
    } else if (isSent) {
      const b = document.createElement('button'); b.className = 'pi-btn pending';
      b.innerHTML = '<i class="fas fa-clock"></i> Pending'; acts.appendChild(b);
    } else {
      const b = document.createElement('button'); b.className = 'pi-btn add';
      b.innerHTML = '<i class="fas fa-user-plus"></i> Add'; b.onclick = () => sendRequest(u.id);
      acts.appendChild(b);
    }
    item.append(av, info, acts);
    list.appendChild(item);
  });
}

/* ── Render: Requests tab ───────────────────────────── */
function renderRequestList() {
  const list = document.getElementById('request-list');
  if (!friendsData.received.length) {
    list.innerHTML = '<div class="empty-state"><i class="fas fa-user-clock"></i><p>No pending requests.</p></div>';
    return;
  }
  list.innerHTML = '';
  friendsData.received.forEach(u => {
    const item = document.createElement('div'); item.className = 'people-item';
    const av   = avatarEl(u, 44);
    const info = document.createElement('div'); info.className = 'pi-info';
    const nm   = document.createElement('div'); nm.className = 'pi-name'; nm.textContent = u.username;
    info.appendChild(nm);
    const acts = document.createElement('div'); acts.className = 'pi-actions';
    const a = document.createElement('button'); a.className = 'pi-btn accept';
    a.innerHTML = '<i class="fas fa-check"></i> Accept'; a.onclick = () => acceptRequest(u.id);
    const d = document.createElement('button'); d.className = 'pi-btn decline';
    d.innerHTML = '<i class="fas fa-times"></i> Decline'; d.onclick = () => declineRequest(u.id);
    acts.append(a, d);
    item.append(av, info, acts);
    list.appendChild(item);
  });
}

function updateOnlineIndicators() {
  friendsData.friends.forEach(f => {
    const dot = document.querySelector(`#fi-${f.id} .av-dot`);
    if (dot) dot.className = 'av-dot' + (onlineSet.has(f.id) ? '' : ' off');
    const last = document.getElementById(`last-${f.id}`);
    if (last) last.textContent = onlineSet.has(f.id) ? 'Active now' : 'Offline';
  });
}

function updateRequestBadge() {
  const b = document.getElementById('req-badge');
  const n = friendsData.received.length;
  b.textContent = n; b.style.display = n ? 'flex' : 'none';
}

/* ── Friend actions ─────────────────────────────────── */
async function sendRequest(id) {
  const r = await api('POST', `/api/friends/request/${id}`);
  if (r.error) return showToast(r.error);
  if (r.status === 'friends') { await refreshFriends(); showToast('You are now friends!'); }
  else { friendsData.sent.push(allUsers.find(u => u.id === id)); showToast('Friend request sent!'); }
  renderPeopleList();
}

async function acceptRequest(id) {
  await api('POST', `/api/friends/accept/${id}`);
  await refreshFriends(); renderPeopleList();
  showToast('Friend request accepted!');
}

async function declineRequest(id) {
  await api('POST', `/api/friends/decline/${id}`);
  friendsData.received = friendsData.received.filter(u => u.id !== id);
  updateRequestBadge(); renderRequestList(); renderPeopleList();
}

async function unfriend(id) {
  await api('POST', `/api/friends/remove/${id}`);
  friendsData.friends = friendsData.friends.filter(f => f.id !== id);
  if (currentFriend?.id === id) closeChat();
  renderFriendList(); renderPeopleList();
  document.getElementById('profile-panel').classList.remove('show');
  showToast('Unfriended');
}

/* ── Open / Close / Clear Chat ──────────────────────── */
async function openChat(friend) {
  currentFriend = friend;
  unreadCounts[friend.id] = 0;

  document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));
  const fi = document.getElementById(`fi-${friend.id}`);
  if (fi) fi.classList.add('active');

  document.getElementById('empty-chat').style.display = 'none';
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('typing-indicator').style.display = 'flex';
  document.getElementById('chat-input-area').style.display = 'flex';

  updateChatHeader();

  const msgs = await api('GET', `/api/chat/${friend.id}`);
  const c = document.getElementById('messages');
  c.innerHTML = '';
  msgs.forEach(m => appendMessage(m));
  scrollToBottom();

  const cid = [me.id, friend.id].sort().join('::');
  socket.emit('mark-seen', { conversationId: cid, viewerId: me.id, senderId: friend.id });

  renderFriendList();

  // Mobile: hide sidebar, show main
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.remove('sb-open');
  }
}

function closeChat() {
  currentFriend = null;
  document.getElementById('empty-chat').style.display = 'flex';
  document.getElementById('chat-header').style.display = 'none';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('typing-indicator').style.display = 'none';
  document.getElementById('chat-input-area').style.display = 'none';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('profile-panel').classList.remove('show');
  document.querySelectorAll('.friend-item').forEach(el => el.classList.remove('active'));

  // Mobile: show sidebar again
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('sb-open');
  }
}

document.getElementById('close-chat-btn').addEventListener('click', closeChat);

document.getElementById('clear-chat-btn').addEventListener('click', () => {
  if (!currentFriend) return;
  document.getElementById('clear-modal').classList.add('show');
});

document.getElementById('confirm-clear-btn').addEventListener('click', () => {
  document.getElementById('messages').innerHTML = '';
  closeModal('clear-modal');
  showToast('Chat cleared');
});

/* ── Back button (mobile) ───────────────────────────── */
document.getElementById('back-btn').addEventListener('click', () => {
  closeChat();
  document.getElementById('sidebar').classList.add('sb-open');
});

/* ── Update chat header ─────────────────────────────── */
function updateChatHeader() {
  if (!currentFriend) return;
  const hdrAv = document.getElementById('hdr-av');
  hdrAv.innerHTML = '';
  const av = avatarEl(currentFriend, 38);
  hdrAv.appendChild(av);
  document.getElementById('hdr-name').textContent = currentFriend.username;
  const st = document.getElementById('hdr-status');
  if (onlineSet.has(currentFriend.id)) { st.textContent = 'Active now'; st.className = 'hdr-status online'; }
  else { st.textContent = 'Offline'; st.className = 'hdr-status'; }
}

/* ── Append message ─────────────────────────────────── */
function appendMessage(msg) {
  const c = document.getElementById('messages');
  const isMine = msg.senderId === me.id;

  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'them');
  row.id = `msg-${msg.id}`;

  // Avatar (their side only)
  const avDiv = document.createElement('div');
  avDiv.className = 'msg-av' + (isMine ? ' hide' : '');
  if (!isMine && currentFriend) {
    if (currentFriend.avatar) {
      const img = document.createElement('img'); img.src = currentFriend.avatar; avDiv.appendChild(img);
    } else {
      const l = document.createElement('div'); l.className = 'av-letter';
      l.textContent = currentFriend.username[0].toUpperCase(); avDiv.appendChild(l);
    }
  }

  // Bubble wrapper
  const wrap = document.createElement('div'); wrap.className = 'bubble-wrap';

  // Delete action
  const acts = document.createElement('div'); acts.className = 'msg-actions';
  if (isMine) {
    const del = document.createElement('button'); del.className = 'msg-act-btn'; del.title = 'Delete';
    del.innerHTML = '<i class="fas fa-trash"></i>';
    del.onclick = () => {
      const cid = [me.id, currentFriend.id].sort().join('::');
      socket.emit('delete-message', { messageId: msg.id, conversationId: cid, senderId: me.id, receiverId: currentFriend.id });
      row.remove();
    };
    acts.appendChild(del);
  }

  // Bubble
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  if (msg.image) {
    const img = document.createElement('img'); img.src = msg.image;
    img.onclick = () => { document.getElementById('lightbox-img').src = msg.image; document.getElementById('lightbox').classList.add('show'); };
    bubble.appendChild(img);
  }
  if (msg.text) {
    const t = document.createElement('span'); t.textContent = msg.text; bubble.appendChild(t);
  }

  // Meta (time + seen)
  const meta = document.createElement('div'); meta.className = 'msg-meta';
  meta.textContent = new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  if (isMine) {
    const seen = document.createElement('span');
    seen.className = 'seen-icon' + (msg.seen ? ' seen' : '');
    seen.innerHTML = msg.seen ? '<i class="fas fa-check-double"></i>' : '<i class="fas fa-check"></i>';
    meta.appendChild(seen);
  }

  wrap.append(acts, bubble, meta);
  row.append(avDiv, wrap);
  c.appendChild(row);
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

/* ── Send message ───────────────────────────────────── */
async function sendMessage() {
  if (!currentFriend) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !selectedImage) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  let imageUrl = null;
  if (selectedImage) {
    const fd = new FormData(); fd.append('image', selectedImage);
    const r = await api('POST', '/api/chat/upload', fd);
    if (r.url) imageUrl = r.url;
    selectedImage = null;
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('file-input').value = '';
  }

  socket.emit('send-message', { senderId: me.id, receiverId: currentFriend.id, text, image: imageUrl });
  input.value = ''; input.style.height = 'auto';
  socket.emit('stop-typing', { senderId: me.id, receiverId: currentFriend.id });
  btn.disabled = false;
  input.focus();
}

/* ── Input events ───────────────────────────────────── */
const msgInput = document.getElementById('msg-input');
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 110) + 'px';
  if (!currentFriend) return;
  socket.emit('typing', { senderId: me.id, receiverId: currentFriend.id, name: me.username });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => socket.emit('stop-typing', { senderId: me.id, receiverId: currentFriend.id }), 1500);
});
document.getElementById('send-btn').addEventListener('click', sendMessage);

// Image attach
document.getElementById('attach-btn').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  selectedImage = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('img-preview-thumb').src = ev.target.result;
    document.getElementById('img-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
});
document.getElementById('remove-img').addEventListener('click', () => {
  selectedImage = null;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('file-input').value = '';
});

/* ── Profile panel (right side) ─────────────────────── */
document.getElementById('profile-info-btn').addEventListener('click', () => {
  if (!currentFriend) return;
  const panel = document.getElementById('profile-panel');
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) renderProfilePanel();
});

function renderProfilePanel() {
  if (!currentFriend) return;
  const ppAv = document.getElementById('pp-av'); ppAv.innerHTML = '';
  if (currentFriend.avatar) {
    const img = document.createElement('img'); img.src = currentFriend.avatar; ppAv.appendChild(img);
  } else {
    const l = document.createElement('div'); l.className = 'av-letter'; l.textContent = currentFriend.username[0].toUpperCase(); ppAv.appendChild(l);
  }
  document.getElementById('pp-name').textContent = currentFriend.username;
  const st = document.getElementById('pp-status');
  onlineSet.has(currentFriend.id)
    ? (st.textContent = 'Active now', st.className = 'pp-status online')
    : (st.textContent = 'Offline',    st.className = 'pp-status');
  document.getElementById('pp-bio').textContent = currentFriend.bio || '';
  document.getElementById('pp-unfriend-btn').onclick = () => unfriend(currentFriend.id);
}

/* ── My profile modal ───────────────────────────────── */
document.getElementById('profile-btn').addEventListener('click', openMyProfile);

function openMyProfile() {
  const myAv = document.getElementById('my-av');
  myAv.innerHTML = '';
  if (me.avatar) {
    const img = document.createElement('img');
    img.src = me.avatar; img.style.cssText = 'width:56px;height:56px;border-radius:50%;object-fit:cover';
    myAv.appendChild(img);
  } else {
    const l = document.createElement('div');
    l.style.cssText = 'width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#833ab4);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:#fff';
    l.textContent = me.username[0].toUpperCase(); myAv.appendChild(l);
  }
  const cam = document.createElement('div');
  cam.style.cssText = 'position:absolute;bottom:0;right:0;width:20px;height:20px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;cursor:pointer';
  cam.innerHTML = '<i class="fas fa-camera" style="color:#fff"></i>';
  cam.onclick = () => document.getElementById('avatar-input').click();
  myAv.appendChild(cam);
  document.getElementById('my-username').textContent = me.username;
  document.getElementById('my-email').textContent = me.email;
  document.getElementById('edit-username').value = me.username;
  document.getElementById('edit-bio').value = me.bio || '';
  document.getElementById('my-profile-modal').classList.add('show');
}

document.getElementById('avatar-input').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('avatar', file);
  const r = await api('POST', '/api/me/update', fd);
  if (r.id) { me = r; localStorage.setItem('user', JSON.stringify(me)); openMyProfile(); showToast('Avatar updated!'); }
});

document.getElementById('save-profile-btn').addEventListener('click', async () => {
  const r = await api('POST', '/api/me/update', {
    username: document.getElementById('edit-username').value.trim(),
    bio:      document.getElementById('edit-bio').value.trim()
  });
  if (r.id) { me = r; localStorage.setItem('user', JSON.stringify(me)); closeModal('my-profile-modal'); showToast('Profile saved!'); renderFriendList(); }
});

/* ── Tabs ───────────────────────────────────────────── */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('tab-chats').style.display   = name === 'chats'    ? 'flex' : 'none';
  document.getElementById('tab-people').style.display  = name === 'people'   ? 'flex' : 'none';
  document.getElementById('tab-requests').style.display= name === 'requests' ? 'flex' : 'none';
}

document.getElementById('req-btn').addEventListener('click', () => switchTab('requests'));

/* ── Search ─────────────────────────────────────────── */
document.getElementById('search-input').addEventListener('input', () => {
  renderFriendList(); renderPeopleList();
});

/* ── Mobile: show sidebar on load ───────────────────── */
function handleMobileInit() {
  if (window.innerWidth <= 640) {
    document.getElementById('sidebar').classList.add('sb-open');
  }
}
window.addEventListener('resize', () => {
  if (window.innerWidth > 640) {
    document.getElementById('sidebar').classList.remove('sb-open');
  }
});

/* ── Utils ──────────────────────────────────────────── */
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 3000);
}
function logout() { localStorage.clear(); window.location.href = '/login'; }

/* ── Boot ───────────────────────────────────────────── */
handleMobileInit();
init();
</script>
</body>
</html>
